<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="label">得分</div>
                    <div class="score" id="score">0</div>
                </div>
                <div class="score-box best">
                    <div class="label">最佳</div>
                    <div class="score" id="bestScore">0</div>
                </div>
            </div>
        </div>
        <div class="sub-header">
            <div class="new-game" id="newGame">新游戏</div>
            <p class="subtitle">合并数字，达到2048!</p>
        </div>
        <div class="game-board" id="gameBoard"></div>
        <p class="instructions">游戏玩法：使用方向键移动方块。当两个相同数字的方块相遇时，它们会合并成一个!直到完成2048！</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
